<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chromashift</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <div id="landscapeWarning">
        <div class="warning-box">
            <div class="rotate-icon">🔄</div>
            <div>Please rotate your device to Landscape mode to play!</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        
        <div id="mainMenu" class="interactive panel-blur">
            <h1 class="game-title">Chromashift</h1>
            <div class="user-badge" id="userBadge">Guest Player</div>
            <div class="admin-badge" id="adminBadge" style="display: none;">🛠️ BUILDER / ADMIN MODE ACTIVE</div>
            
            <div class="menu-buttons">
                <button class="btn btn-play" onclick="startGame()">ENTER MATCH</button>
                <button class="btn btn-shop" onclick="openShop()">THE SHOP</button>
            </div>

            <div id="googleLoginWrapper">
                <div id="g_id_onload"
                     data-client_id="YOUR_NEW_CLIENT_ID_HERE.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
            </div>
        </div>

        <div id="chatContainer" class="interactive panel-blur" style="display: none;">
            <div id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Press Enter or type chat/commands here..." onkeydown="if(event.key === 'Enter') sendChatMessage()">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>

        <div id="builderPanel" class="interactive panel-blur" style="display: none;">
            <h3>🛠️ Builder Tools</h3>
            <p>Tap a block type, then click the game screen to place it!</p>
            <div class="build-options">
                <button class="btn-tool" onclick="setBuildItem('wall')">🧱 Wall Block</button>
                <button class="btn-tool" onclick="setBuildItem('floor')">🟦 Floor Tile</button>
                <button class="btn-tool" onclick="setBuildItem('spawn')">🏁 Spawn Point</button>
                <button class="btn-tool clear" onclick="setBuildItem('erase')">❌ Eraser</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
