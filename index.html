<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChromaShift: Mecha Chameleon</title>
    <!-- Google Identity Services for Secure Login Frameworks -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #0c0b14; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* HUD & Interactive Panels Layouts */
        .ui-layer { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .interactive { pointer-events: auto; }

        /* MAIN MENU INTERFACE SCREEN */
        #mainMenu { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 100; background: linear-gradient(135deg, #11141a 0%, #0c0b14 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .menu-title { font-size: 42px; font-weight: 900; letter-spacing: 4px; color: #00ffcc; text-shadow: 0 0 20px rgba(0,255,204,0.4); margin-bottom: 5px; }
        .menu-subtitle { font-size: 14px; color: #656a7a; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        
        .menu-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 16px; width: 340px; text-align: center; backdrop-filter: blur(10px); }
        .badge { background: rgba(0,255,204,0.1); border: 1px solid rgba(0,255,204,0.3); color: #00ffcc; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 20px; }
        
        .btn { background: #fff; color: #000; border: none; padding: 14px 28px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 12px; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.1); }
        .btn-primary { background: #00ffcc; color: #0b0e14; }
        .btn-primary:hover { box-shadow: 0 5px 20px rgba(0,255,204,0.3); }
        .btn-secondary { background: #ff3366; color: #fff; }

        /* GAMEPLAY SYSTEM TOPBAR */
        #topbarMenu { display: none; width: 100%; justify-content: space-between; align-items: center; }
        .hud-status { background: rgba(12,11,20,0.75); border: 1px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; color: #fff; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(5px); }
        .live-indicator { width: 8px; height: 8px; background: #00ffcc; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px #00ffcc; }
        
        .topbar-actions { display: flex; gap: 8px; }
        .btn-nav { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 16px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .btn-nav:hover, .btn-nav.active { background: #fff; color: #000; }

        /* LIVE REAL-TIME CHAT FRAME */
        #chatContainer { display: none; width: 320px; height: 180px; background: rgba(12,11,20,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; flex-direction: column; backdrop-filter: blur(4px); overflow: hidden; margin-top: auto; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; font-size: 13px; }
        .chat-line { color: #e1e4ed; line-height: 1.4; word-break: break-word; }
        .chat-line span { color: #00ffcc; font-weight: bold; margin-right: 4px; }
        .chat-line .chat-system { color: #ffcc00; }
        .chat-bar { display: flex; border-top: 1px solid rgba(255,255,255,0.08); }
        #chatInput { flex: 1; background: transparent; border: none; padding: 8px 12px; color: #fff; font-size: 13px; outline: none; }

        /* CHAMELEON ACTION WHEEL OVERLAYS (ROBLOX STYLE) */
        #actionControls { display: none; position: absolute; right: 20px; bottom: 20px; flex-direction: column; gap: 12px; z-index: 50; }
        .action-circle { width: 65px; height: 65px; background: rgba(12,11,20,0.8); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: #fff; font-size: 11px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.4); text-transform: uppercase; }
        .action-circle:active { transform: scale(0.9); border-color: #00ffcc; color: #00ffcc; }
        .action-paint { background: rgba(0,255,204,0.15); border-color: #00ffcc; }

        /* DEVELOPER OPERATIONS CONSOLE BOX */
        #adminConsole { display: none; position: absolute; top: 70px; left: 15px; width: 420px; height: 260px; background: #07090e; border: 1px solid #1f293d; border-radius: 8px; flex-direction: column; overflow: hidden; }
        .console-header { background: #0d131f; padding: 8px 12px; font-size: 11px; font-weight: bold; color: #6b7c96; letter-spacing: 1px; border-bottom: 1px solid #1f293d; }
        #consoleLog { flex: 1; padding: 10px; overflow-y: auto; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; gap: 4px; }
        .console-line { color: #a4b3c6; }
        .console-tag-admin { color: #ff3366; font-weight: bold; }
        .console-tag-system { color: #00ffcc; font-weight: bold; }
        .console-bar { display: flex; background: #0a0f18; border-top: 1px solid #1f293d; }
        #consoleInput { flex: 1; background: transparent; border: none; padding: 8px 12px; color: #00ffcc; font-family: monospace; font-size: 12px; outline: none; }

        #g_id_onload { margin-top: 15px; display: inline-block; }
    </style>
</head>
<body>

    <!-- CORE GAME SCREEN GRAPHICS RENDERING FIELD -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI GRAPHICS OVERLAY MANAGER LAYER -->
    <div class="ui-layer">
        
        <!-- TOP HUD SYSTEM CONTROL BAR -->
        <div id="topbarMenu" class="interactive">
            <div class="hud-status">
                <span class="live-indicator"></span>
                <span id="lobbyStatusBadge">SINGLEPLAYER MATCH</span>
            </div>
            <div class="topbar-actions">
                <button id="toggleConsoleBtn" class="btn-nav" style="display:none;" onclick="togglePanel('adminConsole')">Console</button>
                <button class="btn-nav btn-secondary" onclick="exitToLobby()">Exit Field</button>
            </div>
        </div>

        <!-- DEVELOPER ROOT LEVEL OPERATIONS COMMAND TERMINAL -->
        <div id="adminConsole" class="interactive">
            <div class="console-header">SECURE DEVELOPMENT MATRIX SHELL</div>
            <div id="consoleLog"></div>
            <div class="console-bar">
                <input type="text" id="consoleInput" placeholder="execute console string parameter query..." onkeydown="if(e.key==='Enter'||event.key==='Enter') executeConsoleCommand()">
            </div>
        </div>

        <!-- MOBILE SCREEN ACTION TRIGGERS (MECHA CHAMELEON MODE) -->
        <div id="actionControls" class="interactive">
            <button class="action-circle action-paint" onclick="togglePaintMode()">🎨 Paint<br>(F)</button>
            <button class="action-circle" onclick="cyclePoses()">🧍 Pose<br>(R)</button>
            <button class="action-circle" onclick="triggerTauntWhistle()">🎵 Taunt<br>(T)</button>
        </div>

        <!-- LIVE TEXT CONVERSATION CHAT STREAM BOX -->
        <div id="chatContainer" class="interactive">
            <div id="chatMessages"></div>
            <div class="chat-bar">
                <input type="text" id="chatInput" placeholder="Send chat message..." onkeydown="if(e.key==='Enter'||event.key==='Enter') sendChatMessage()">
            </div>
        </div>

    </div>

    <!-- ROOT LEVEL ACCOUNT LOGON WINDOW INTERFACE OVERLAY -->
    <div id="mainMenu">
        <h1 class="menu-title">CHROMASHIFT</h1>
        <div class="menu-subtitle">Mecha Chameleon Clone Engine</div>
        
        <div class="menu-box">
            <div id="adminBadge" class="badge" style="display: none;">⚙️ ROOT PRIVILEGES ACTIVE</div>
            <div id="userBadge" style="color:#a4b3c6; font-size:14px; margin-bottom:20px; font-weight:500;">Connecting system configurations...</div>
            
            <button class="btn btn-primary" onclick="selectGameMode('hider')">PLAY AS HIDER</button>
            <button class="btn" style="background: #2a2e3d; color: #fff;" onclick="selectGameMode('seeker')">PLAY AS SEEKER</button>
            <button class="btn" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1);" onclick="openShop()">THE CUSTOM PROPS SHOP</button>
            
            <!-- Google Login Identity Engine Mount Location -->
            <div id="g_id_onload"
                 data-client_id="843070404095-2m208ep6vj7vj1mvea86v0as74m57mar.apps.googleusercontent.com"
                 data-callback="handleGoogleSignIn"
                 data-auto_select="true">
            </div>
            <div class="g_id_signin" data-type="standard" data-theme="dark" data-size="large" data-width="280"></div>
        </div>
    </div>

    <!-- MOUNT INTERNAL GAME ENGINE PROCESSING SCRIPT CONFIGURATION MODULES -->
    <script src="main.js"></script>
</body>
</html>
