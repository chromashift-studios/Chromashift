<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ChromaShift: 3D Mecha Edition</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui-layer { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 15px; }
        .interactive { pointer-events: auto; }

        /* MAIN MENU */
        #mainMenu { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 100; background: #0f111a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
        .menu-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .input-flat { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1d29; border: 1px solid #333; color: #fff; border-radius: 6px; text-align: center; outline: none; }
        .btn { background: #00ffcc; color: #000; border: none; padding: 14px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        
        /* HUD CONTROLS */
        #topbarMenu { display: none; width: 100%; justify-content: space-between; pointer-events: none; }
        .hud-badge { background: rgba(0,0,0,0.7); padding: 8px 16px; border-radius: 6px; color: #fff; font-size: 13px; font-weight: bold; }
        .btn-nav { background: #ff3366; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; pointer-events: auto; }

        #actionControls { display: none; position: absolute; right: 20px; bottom: 20px; flex-direction: column; gap: 10px; }
        .action-circle { width: 60px; height: 60px; background: rgba(0,0,0,0.75); border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .action-paint { border-color: #00ffcc; color: #00ffcc; }

        #chatContainer { display: none; width: 280px; height: 140px; background: rgba(0,0,0,0.5); border-radius: 6px; flex-direction: column; margin-top: auto; overflow: hidden; }
        #chatMessages { flex: 1; overflow-y: auto; padding: 8px; font-size: 12px; color: #fff; display: flex; flex-direction: column; gap: 2px; }
        .chat-bar { display: flex; border-top: 1px solid rgba(255,255,255,0.1); }
        #chatInput { flex: 1; background: transparent; border: none; padding: 6px; color: #fff; outline: none; font-size: 12px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div id="topbarMenu">
            <div class="hud-badge" id="lobbyStatusBadge">3D CHAMELEON MATRIX</div>
            <button class="btn-nav" onclick="exitToLobby()">Exit</button>
        </div>

        <div id="actionControls" class="interactive">
            <button class="action-circle action-paint" onclick="togglePaintMode()">🎨 Paint</button>
            <button class="action-circle" onclick="cyclePoses()">🧍 Pose</button>
        </div>

        <div id="chatContainer" class="interactive">
            <div id="chatMessages"></div>
            <div class="chat-bar">
                <input type="text" id="chatInput" placeholder="Press Enter to chat..." onkeydown="if(event.key==='Enter') sendChatMessage()">
            </div>
        </div>
    </div>

    <div id="mainMenu">
        <h1 style="color:#00ffcc; margin-bottom:5px; letter-spacing:2px;">CHROMASHIFT 3D</h1>
        <p style="color:#555; font-size:12px; margin-bottom:20px; text-transform:uppercase;">Roblox Chameleon Projection</p>
        
        <div class="menu-box">
            <input type="text" id="usernameFallback" class="input-flat" placeholder="Enter Nickname..." value="PlayerXian">
            <button class="btn" onclick="selectGameMode()">SPAWN INTO 3D ARENA</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
