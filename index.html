<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chromashift</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        
        <div id="mainMenu" class="interactive panel-blur">
            <h1 class="game-title">Chromashift</h1>
            <div class="user-badge" id="userBadge">Guest Player</div>
            <div class="admin-badge" id="adminBadge" style="display: none;">🛠️ ADMIN / BUILDER ACTIVE</div>
            
            <div class="menu-buttons">
                <button class="btn btn-play" onclick="selectGameMode('singleplayer')">🟢 SINGLEPLAYER</button>
                <button class="btn btn-multi" onclick="selectGameMode('multiplayer')">🌐 MULTIPLAYER MATCH</button>
                <button class="btn btn-shop" onclick="openShop()">THE SHOP</button>
            </div>

            <div id="googleLoginWrapper">
                <div id="g_id_onload"
                     data-client_id="633736205688-igj2r9tnl31rh85b1rqiot9ts7vfc1iq.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
            </div>
        </div>

        <div id="chatContainer" class="interactive panel-blur" style="display: none;">
            <div id="chatMessages"></div>
            <div class="chat-input-row">
                <input type="text" id="chatInput" placeholder="Type message or command..." onkeydown="if(event.key === 'Enter') sendChatMessage()">
                <button onclick="sendChatMessage()">Send</button>
            </div>
        </div>

        <div id="adminConsole" class="interactive" style="display: none;">
            <div class="console-body panel-blur">
                <div class="console-header">💻 SECURE CORE DEVELOPER CONSOLE</div>
                <div id="consoleLog"></div>
                <div class="console-input-row">
                    <span class="console-prompt">admin@chromashift:~$</span>
                    <input type="text" id="consoleInput" placeholder="Execute console string..." onkeydown="if(event.key === 'Enter') executeConsoleCommand()">
                </div>
            </div>
            
            <div class="console-help panel-blur">
                <h4>📜 GAME COMMANDS</h4>
                <ul>
                    <li><span class="cmd-syntax">!admin [gmail]</span> <br><small>Add new builder</small></li>
                    <li><span class="cmd-syntax">!setspawn [1-5]</span> <br><small>Save player spawn layout</small></li>
                    <li><span class="cmd-syntax">!announce [text]</span> <br><small>Global alert message</small></li>
                </ul>
                <div class="console-status" id="activeModeStatus">LOBBY MODE</div>
            </div>
        </div>

        <div id="builderPanel" class="interactive panel-blur" style="display: none;">
            <h3>🛠️ Builder Tools</h3>
            <div class="build-options">
                <button class="btn-tool" onclick="setBuildItem('wall')">🧱 Wall Block</button>
                <button class="btn-tool" onclick="setBuildItem('floor')">🟦 Floor Tile</button>
                <button class="btn-tool clear" onclick="setBuildItem('erase')">❌ Eraser</button>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
